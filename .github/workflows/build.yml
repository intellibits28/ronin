name: Ronin Kernel Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y flatbuffers-compiler valgrind sqlite3 libsqlite3-dev
      - name: Generate FlatBuffers Headers
        run: |
          mkdir -p generated
          flatc --cpp -o generated/ checkpoint_schema.fbs
      - name: Build Host Tests
        run: |
          mkdir build_host && cd build_host
          cmake -DCMAKE_BUILD_TYPE=Debug ..
          make ronin_atomic_test ronin_precision_test ronin_memory_test ronin_search_test
      - name: Run Host Tests
        run: |
          cd build_host
          ./ronin_atomic_test
          ./ronin_precision_test
          ./ronin_memory_test
          ./ronin_search_test

  build-apk:
    needs: test-host
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Android NDK r26b
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install FlatBuffers Compiler
        run: sudo apt-get update && sudo apt-get install -y flatbuffers-compiler

      - name: Generate FlatBuffers Headers
        run: |
          mkdir -p generated
          flatc --cpp -o generated/ checkpoint_schema.fbs

      - name: Fetch and Extract MediaPipe GenAI Binary
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          # Download official AAR
          curl -L https://dl.google.com/android/maven2/com/google/mediapipe/tasks-genai/0.10.14/tasks-genai-0.10.14.aar -o tasks-genai.aar
          
          # Unzip entirely to a temp directory to see structure
          mkdir -p temp_aar
          unzip -o tasks-genai.aar -d temp_aar
          
          # Find any .so files and move the arm64-v8a one
          echo "Listing discovered JNI libraries in AAR:"
          find temp_aar -name "*.so"
          
          # Move the library (trying to find it regardless of exact jni/ vs lib/ path)
          find temp_aar -path "*arm64-v8a*" -name "libllm_inference_engine_jni.so" -exec cp {} android/app/src/main/jniLibs/arm64-v8a/ \;
          
          # Verification Step
          if [ ! -f "android/app/src/main/jniLibs/arm64-v8a/libllm_inference_engine_jni.so" ]; then
            echo "ERROR: libllm_inference_engine_jni.so not found in AAR."
            ls -R temp_aar
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "android/app/src/main/jniLibs/arm64-v8a/libllm_inference_engine_jni.so")
          echo "Found Binary Size: $FILE_SIZE bytes"
          file android/app/src/main/jniLibs/arm64-v8a/libllm_inference_engine_jni.so

      - name: "Debug: List JNI Libraries and Model Assets"
        run: |
          echo "--- Assets models ---"
          ls -R android/app/src/main/assets/models || echo "Assets directory missing"
          echo "--- jniLibs (if any) ---"
          ls -R android/app/src/main/jniLibs || echo "jniLibs directory missing"
          echo "--- Searching for shared libraries (.so) ---"
          find . -name "*.so"

      - name: Build Android APK
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: android
          gradle-version: 8.2
          cache-disabled: true
          arguments: clean assembleDebug

      - name: Upload Ronin APK
        uses: actions/upload-artifact@v4
        with:
          name: ronin-kernel-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
